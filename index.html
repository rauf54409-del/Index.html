.demo-bar b{color:#8fb4ff}
.demo-bar button{background:none;border:1px solid rgba(255,255,255,.35);color:#fff;font-size:10px;padding:3px 8px;border-radius:999px;margin-left:8px;cursor:pointer}

/* ---------------- parallax system (applies on every page/section) ---------------- */
#px-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
#px-bg span{position:absolute;border-radius:50%;filter:blur(40px);opacity:.35;will-change:transform}
#px-bg span.b1{width:260px;height:260px;background:#1d6cf5;top:-80px;left:-60px}
#px-bg span.b2{width:220px;height:220px;background:#8fb4ff;top:40vh;right:-80px}
#px-bg span.b3{width:300px;height:300px;background:#0d4fd0;bottom:-100px;left:-40px}
.app{position:relative;z-index:1;background:transparent!important}
body{background:var(--bg)}
.header-block{position:relative;overflow:hidden}
.header-block .px-orb{position:absolute;border-radius:50%;background:rgba(255,255,255,.16);will-change:transform;pointer-events:none}
.header-block .px-orb.o1{width:130px;height:130px;top:-50px;right:-30px}
.header-block .px-orb.o2{width:80px;height:80px;bottom:-30px;left:-20px}
.header-block>*{position:relative;z-index:1}
@media (prefers-reduced-motion: reduce){
  #px-bg span,.header-block .px-orb{transform:none!important;transition:none!important}
}

<div class="app" id="app"><div class="spinner"></div></div>

<script>
/* Scroll-driven parallax: background blobs drift slower than scroll,
   header orbs drift opposite direction for depth. Runs globally so it
   applies to every mounted page/section automatically. */
(function(){
  const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduce) return;
  let ticking = false;
  function apply(){
    const y = window.scrollY || window.pageYOffset || 0;
    const bg = document.getElementById("px-bg");
    if (bg){
      const spans = bg.children;
      if (spans[0]) spans[0].style.transform = "translateY(" + (y*0.15) + "px)";
      if (spans[1]) spans[1].style.transform = "translateY(" + (y*-0.10) + "px)";
      if (spans[2]) spans[2].style.transform = "translateY(" + (y*0.08) + "px)";
    }
    document.querySelectorAll(".header-block").forEach(function(h){
      const rect = h.getBoundingClientRect();
      const offset = rect.top * 0.15;
      const orbs = h.querySelectorAll(".px-orb");
      orbs.forEach(function(o,i){ o.style.transform = "translateY(" + (offset * (i?-1:1)) + "px)"; });
    });
    ticking = false;
  }
  window.addEventListener("scroll", function(){
    if (!ticking){ requestAnimationFrame(apply); ticking = true; }
  }, { passive:true });
  // Inject orb elements into any header-block whenever the DOM changes (SPA re-mounts).
  function injectOrbs(){
    document.querySelectorAll(".header-block").forEach(function(h){
      if (!h.querySelector(".px-orb")){
        const o1=document.createElement("div"); o1.className="px-orb o1";
        const o2=document.createElement("div"); o2.className="px-orb o2";
        h.appendChild(o1); h.appendChild(o2);
      }
    });
    apply();
  }
  const mo = new MutationObserver(injectOrbs);
  mo.observe(document.getElementById("app"), { childList:true, subtree:true });
  document.addEventListener("DOMContentLoaded", injectOrbs);
  injectOrbs();
})();
</script>

<script>
/* ============================================================
   EarnPkrauf — cloud build. Data lives in Supabase (Postgres),
   screenshots are hosted on Cloudinary. All money-affecting
   logic (balances, tax, referral bonuses, admin approvals) runs
   inside Postgres functions, not in this client-side file.
   ============================================================ */

window.EARNPKR_CONFIG = {

  DEPOSIT_ACCOUNT_NAME: "EarnPkrauf",

/* ---------------- helpers ---------------- */
window.rs = (n) => EARNPKR_CONFIG.CURRENCY + " " + Number(n || 0).toLocaleString();
window.qs = (s, r = document) => r.querySelector(s);
window.qsa = (s, r = document) => Array.from(r.querySelectorAll(s));
function hashParts(){ let h = location.hash.slice(1) || "/"; let [route, query=""] = h.split("?"); return {route, query}; }
window.getParam = (k) => new URLSearchParams(hashParts().query).get(k);
window.toast = function (msg) {
  let t = qs("#toast");
  if (!t) { t = document.createElement("div"); t.id = "toast"; t.className = "toast"; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("show"), 2400);
};
window.mount = (html) => { qs("#app").innerHTML = html; };
window.loading = () => mount('<div class="spinner"></div>');
window.errorBox = (msg) => `<div class="card center"><p class="muted">${msg}</p></div>`;
/* shared date formatter (used by notifications, admin panel, etc.) — must be
   global, not re-declared locally inside a single page function, otherwise
   any other page calling it throws "fmtDate is not defined". */
window.fmtDate = function (s) { if (!s) return "—"; const d = new Date(s); return isNaN(d) ? String(s) : d.toLocaleDateString(); };

window.header = function ({ title, emoji = "", subtitle = "", back = "" }) {
  return `<div class="grad header-block">
    ${back ? `<a class="back" href="${back}">← Back</a>` : ""}
    <h1 style="margin-top:${back ? "12px" : "0"};font-size:24px;font-weight:800">${emoji} ${title}</h1>
    ${subtitle ? `<p style="opacity:.9;margin:6px 0 0;font-size:14px">${subtitle}</p>` : ""}
  </div>`;
};
window.tabbar = function (active) {
  const T = [["#/dashboard","🏠","Home"],["#/tasks","📋","Tasks"],["#/deposit","💳","Deposit"],["#/invite","👥","Invite"],["#/vip","👑","VIP"]];
  return `<div class="tabbar">${T.map(([h, i, l]) =>
    `<a href="${h}" class="${active === h ? "active" : ""}"><span class="ic">${i}</span>${l}</a>`).join("")}</div>`;
};

/* ============================================================
   EarnPkrauf — now running on Supabase (cloud database) +
   Cloudinary (image hosting) instead of localStorage.
   All business logic (balances, tax, referral bonuses, admin
   actions) lives in Postgres functions on Supabase, so it can't
   be tampered with from the browser console anymore.
   ============================================================ */

window.SUPABASE_URL = "https://nmijxktbnpewuohrwcbz.supabase.co";
window.SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5taWp4a3RibnBld3VvaHJ3Y2J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMTc2OTAsImV4cCI6MjA5ODc5MzY5MH0.ZhEQ_r-QI54iRmk30FZscmOFPV6fF_LFZeSPuup1_To";
window.CLOUDINARY_CLOUD_NAME = "vmphfgnr";
window.CLOUDINARY_UPLOAD_PRESET = "Earnpkr";

const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
function todayStr(){ return new Date().toISOString().slice(0,10); }
/* ---------------- image upload (Cloudinary) ---------------- */
async function uploadToCloudinary(file){
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", window.CLOUDINARY_UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${window.CLOUDINARY_CLOUD_NAME}/auto/upload`, { method: "POST", body: fd });
  const data = await res.json();
  if (!res.ok) throw new Error((data && data.error && data.error.message) || "Screenshot upload failed. Please try again.");
  return data.secure_url;
}
async function uploadAllToCloudinary(files){
  const urls = [];
  for (const f of files) { if (f && f.size) urls.push(await uploadToCloudinary(f)); }
  return urls;
}

/* ---------------- real auth session (Supabase Auth — cryptographically verified) ----------------
   The server (Postgres functions) reads WHO you are from your signed-in session token
   (auth.uid()), never from anything the browser sends as a plain parameter. So nobody
   can open devtools and pretend to be another user anymore. */
let _authUser = null;   // { id, email } of the signed-in Supabase Auth user
let _isAdmin = false;

window.initAuth = async function () {
  const bar = document.getElementById("cfgWarnBar");
  if (bar) bar.style.display = "none";
  const { data: { session } } = await sb.auth.getSession();
  _authUser = session ? session.user : null;
  if (_authUser) {
    try { const p = await rpc("get_profile", {}); _isAdmin = !!p.is_admin; }
    catch (e) { _authUser = null; _isAdmin = false; }
  }
  sb.auth.onAuthStateChange((_event, session) => {
    _authUser = session ? session.user : null;
    if (!_authUser) _isAdmin = false;
  });
};
window.isLoggedIn = () => !!_authUser;
window.currentUserId = () => (_authUser ? _authUser.id : null);
window.isCurrentUserAdmin = () => _isAdmin;
window.requireAuth = function () { if (!isLoggedIn()) { location.hash = "#/login"; return false; } return true; };
window.redirectIfAuthed = function () { if (isLoggedIn()) location.hash = "#/dashboard"; };
window.logout = async function () { await sb.auth.signOut(); _authUser = null; _isAdmin = false; location.hash = "#/"; router(); };

window.showWelcomePopup = function(title, text){
  const el=document.createElement("div");
  el.className="modal-overlay";
  el.innerHTML=`<div class="modal-box"><div style="font-size:40px;margin-bottom:10px">🎉</div>
    <h2 style="margin-bottom:8px">${title}</h2><p class="muted" style="margin-bottom:18px">${text}</p>
    <button class="btn btn-primary" id="wp-close">Got it!</button></div>`;
  document.body.appendChild(el);
  el.querySelector("#wp-close").onclick=()=>el.remove();
};

/* VIP plan prices — used directly here, no backend needed */
const VIP_PLANS = [
  { level:1, price:500, referral_bonus:"+5% referral bonus", perks:["Priority tasks","5% referral bonus","Faster withdrawals","VIP support"] },
];

/* ---------------- API layer — talks to Supabase Postgres functions ----------------
   Every function below reads auth.uid() on the server side, so no p_user_id /
   p_actor_id is ever sent from here for "who am I" — only target ids for admin
   actions on OTHER users are passed explicitly. */
async function rpc(name, params){
  const { data, error } = await sb.rpc(name, params || {});
  if (error) throw new Error(error.message || "Something went wrong. Please try again.");
  return data;
}

window.api = async function (path, { method = "GET", body = {}, form } = {}) {
  /* public */
  if (path === "/public/settings") return await rpc("get_public_settings");
  if (path === "/public/home") return await rpc("get_public_home");

  /* auth — handled by Supabase Auth itself (real signed sessions, not custom tables) */
  if (path === "/auth/register" && method === "POST") {
    const { data, error } = await sb.auth.signUp({
      email: body.email, password: body.password,
      options: { data: { name: body.name || "", username: body.username || "", phone: body.phone || "", ref: body.ref || "" } }
    });
    if (error) throw new Error(error.message);
    _authUser = data.user;
    let profile = null;
    try { profile = await rpc("get_profile", {}); _isAdmin = !!(profile && profile.is_admin); }
    catch (e) { /* email confirmation may be required before a profile/session exists yet */ }
    return { token: data.user ? data.user.id : null, user: profile };
  }
  if (path === "/auth/login" && method === "POST") {
    const { data, error } = await sb.auth.signInWithPassword({ email: body.email, password: body.password });
    if (error) throw new Error(error.message === "Invalid login credentials" ? "Invalid email or password" : error.message);
    _authUser = data.user;
    const profile = await rpc("get_profile", {});
    _isAdmin = !!profile.is_admin;
    return { token: data.user.id, user: profile };
  }
  if (path === "/auth/logout") { await sb.auth.signOut(); _authUser = null; _isAdmin = false; return { ok:true }; }

  /* user */
  if (path === "/dashboard") {
    const r = await rpc("get_dashboard", {});
    _isAdmin = !!r.isAdmin;
    return r;
  }
  if (path === "/profile" && method === "POST") {
    const profile = await rpc("update_profile", { p_name: body.name ?? null, p_username: body.username ?? null,
      p_phone: body.phone ?? null, p_payment_method: body.payment_method ?? null,
      p_payment_account_number: body.payment_account_number ?? null, p_payment_account_title: body.payment_account_title ?? null });
    return { profile };
  }
  if (path === "/notifications") return await rpc("get_notifications", {});
  if (path === "/notifications/seen" && method === "POST") return await rpc("mark_notifications_seen", {});
  if (path === "/invite") return await rpc("get_invite", {});
  if (path === "/invite/claim" && method === "POST") return await rpc("claim_referral_bonus", {});

  /* tasks */
  if (path === "/tasks" && method === "GET") return await rpc("list_tasks", {});
  if (path === "/tasks" && method === "POST") {
    const files = form ? form.getAll("screenshots") : [];
    const screenshots = await uploadAllToCloudinary(files);
    return await rpc("create_task", { p_title: body.title, p_description: body.description || "",
      p_link: body.link || "", p_reward: Number(body.reward), p_total_slots: Number(body.total_slots),
      p_min_vip_level: Number(body.min_vip_level)||0, p_screenshots: screenshots });
  }
  if (path.match(/^\/tasks\/[^/]+\/start$/) && method === "POST") {
    const taskId = path.split("/")[2];
    return await rpc("start_task", { p_task_id: taskId });
  }
  if (path.startsWith("/tasks/") && path.endsWith("/proof") && method === "POST") {
    const taskId = path.split("/")[2];
    const files = form ? form.getAll("proof") : [];
    if (!files.length) throw new Error("Please choose at least one screenshot");
    const urls = await uploadAllToCloudinary(files);
    return await rpc("submit_proof", { p_task_id: taskId, p_proof_urls: urls });
  }
  if (path === "/proofs") return await rpc("get_my_proofs", {});
  if (path === "/manage") return await rpc("get_manage", {});
  if (path.match(/^\/proofs\/.+\/review$/) && method === "POST") {
    const id = path.split("/")[2];
    return await rpc("review_proof", { p_proof_id: id, p_approve: !!body.approve });
  }
  if (path.match(/^\/tasks\/[^/]+$/) && method === "GET") {
    const id = path.split("/")[2];
    return await rpc("get_task", { p_task_id: id });
  }

  /* money */
  if (path === "/deposit" && method === "POST") {
    const files = form ? form.getAll("screenshot") : [];
    if (!files.length || !files[0].size) throw new Error("Deposit screenshot is required");
    const screenshotUrl = await uploadToCloudinary(files[0]);
    return await rpc("make_deposit", { p_amount: Number(body.amount), p_method: body.method,
      p_sender_account: body.sender_account, p_txn_ref: body.txn_ref, p_screenshot_url: screenshotUrl });
  }
  if (path === "/withdraw" && method === "POST") {
    return await rpc("make_withdrawal", { p_amount: Number(body.amount), p_method: body.method, p_account_number: body.account_number });
  }

  /* rewards */
  if (path === "/vip") return { plans: VIP_PLANS };
  if (path === "/vip/buy" && method === "POST") return await rpc("vip_buy", { p_level: Number(body.level) });
  if (path === "/spin" && method === "POST") return await rpc("do_spin", {});
  if (path === "/streak" && method === "POST") return await rpc("do_streak", {});
  if (path === "/coupon" && method === "POST") return await rpc("redeem_coupon", { p_code: body.code });

  /* admin (server re-checks is_admin from auth.uid() on every call — a spoofed
     client flag can't grant access) */
  if (path === "/admin/overview") return await rpc("admin_overview", {});
  if (path === "/admin/users") return await rpc("admin_users", {});
  if (path.match(/^\/admin\/user\/.+\/earnings$/)) {
    const id = path.split("/")[3];
    return await rpc("admin_user_earnings", { p_target_id: id });
  }
  if (path.match(/^\/admin\/user\/.+\/block$/) && method === "POST") {
    const id = path.split("/")[3];
    return await rpc("admin_block_user", { p_target_id: id, p_block: !!body.block });
  }
  if (path === "/admin/tasks") return await rpc("admin_tasks", {});
  if (path === "/admin/proofs") return await rpc("admin_proofs", {});
  if (path === "/admin/deposits") return await rpc("admin_deposits", {});
  if (path === "/admin/withdrawals") return await rpc("admin_withdrawals", {});
  if (path.match(/^\/admin\/deposit\/.+\/review$/) && method === "POST") {
    const id = path.split("/")[3];
    return await rpc("admin_review_deposit", { p_deposit_id: id, p_approve: !!body.approve });
  }
  if (path.match(/^\/admin\/withdraw\/.+\/review$/) && method === "POST") {
    const id = path.split("/")[3];
    return await rpc("admin_review_withdrawal", { p_withdrawal_id: id, p_approve: !!body.approve });
  }
  if (path.match(/^\/admin\/proof\/.+\/review$/) && method === "POST") {
    const id = path.split("/")[3];
    return await rpc("admin_review_proof", { p_proof_id: id, p_approve: !!body.approve });
  }
  if (path.match(/^\/admin\/task\/.+\/toggle$/) && method === "POST") {
    const id = path.split("/")[3];
    return await rpc("admin_toggle_task", { p_task_id: id, p_active: !!body.active });
  }
  if (path === "/admin/coupon" && method === "POST") {
    return await rpc("admin_create_coupon", { p_code: body.code, p_amount: Number(body.amount), p_max_uses: Number(body.max_uses) });
  }
  if (path === "/admin/settings" && method === "GET") return await rpc("admin_get_settings", {});
  if (path === "/admin/settings/deposit-account" && method === "POST") {
    return await rpc("admin_add_deposit_account", { p_method: body.method, p_number: body.number, p_title: body.title });
  }
  if (path.match(/^\/admin\/settings\/deposit-account\/\d+$/) && method === "DELETE") {
    const idx = Number(path.split("/")[4]);
    return await rpc("admin_del_deposit_account", { p_idx: idx });
  }
  if (path === "/admin/settings/withdrawal-method" && method === "POST") {
    return await rpc("admin_add_withdrawal_method", { p_name: body.name });
  }
  if (path.match(/^\/admin\/settings\/withdrawal-method\/\d+$/) && method === "DELETE") {
    const idx = Number(path.split("/")[4]);
    return await rpc("admin_del_withdrawal_method", { p_idx: idx });
  }
  if (path === "/admin/settings/task-approval" && method === "POST") {
    return await rpc("admin_save_task_approval", { p_on: !!body.on, p_message: body.message ?? null });
  }
  if (path === "/admin/settings/maintenance" && method === "POST") {
    return await rpc("admin_save_maintenance", { p_on: !!body.on, p_message: body.message ?? null });
  }
  if (path === "/admin/settings/support-url" && method === "POST") {
    return await rpc("admin_save_support_url", { p_url: body.url });
  }

  throw new Error("Unknown endpoint: " + path);
};

function pageTask(){
  if(!requireAuth()) return;
  const id=getParam("id");
  if(!id){ location.hash="#/tasks"; router(); return; }
  const ONE_HOUR_MS = 60*60*1000;
  let countdownTimer=null;

  function infoBlock(t){
    return `<div class="soft" style="padding:16px;margin-bottom:14px">
        <b style="font-size:17px">${t.title}</b><div class="muted" style="font-size:12px">Task ID: #${t.id.slice(-6)}</div>
        <div class="grid2" style="margin-top:12px;gap:10px">
          <div style="background:var(--bg);border-radius:14px;padding:10px;text-align:center"><div class="bignum" style="font-size:17px">${rs(t.reward)}</div><span class="muted" style="font-size:11px">Reward</span></div>
          <div style="background:var(--bg);border-radius:14px;padding:10px;text-align:center"><div class="bignum" style="font-size:17px">${t.slots_left}</div><span class="muted" style="font-size:11px">Slots Left</span></div>
          <div style="background:var(--bg);border-radius:14px;padding:10px;text-align:center"><div class="bignum" style="font-size:17px">${t.completed_count}</div><span class="muted" style="font-size:11px">Completed Users</span></div>
          <div style="background:var(--bg);border-radius:14px;padding:10px;text-align:center"><div class="bignum" style="font-size:17px">${t.total_slots}</div><span class="muted" style="font-size:11px">Total Users</span></div>
        </div>
      </div>
      <div class="card"><h3 style="margin-bottom:6px">📝 Task Description</h3><p class="muted">${t.description||"—"}</p></div>
      ${t.screenshots&&t.screenshots.length?`<div class="card"><h3 style="margin-bottom:10px">📷 Task Screenshots</h3>
        <div class="row" style="flex-wrap:wrap;gap:8px">${t.screenshots.map(s=>`<img src="${s}" style="width:72px;height:72px;object-fit:cover;border-radius:10px">`).join("")}</div></div>`:""}
      ${t.link?`<a href="${t.link}" target="_blank" class="btn btn-primary" style="margin:6px 0 14px;display:block">🔗 Open Task</a>`:""}`;
  }

  function view(t){
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer=null; }

    if (t.already_done) {
      mount(header({title:"Task Details",emoji:"📋",subtitle:t.title,back:"#/tasks"})+
      `<div style="padding:0 16px">${infoBlock(t)}
        <div class="card center"><p class="muted">✅ Aap ye task pehle hi submit/complete kar chuke hain. "Tasks" tab me naye tasks dekhein.</p></div>
      </div>`);
      return;
    }

    const elapsed = t.started_at ? (Date.now()-t.started_at) : 0;
    const expired = !!(t.started_at && elapsed > ONE_HOUR_MS);

    let actionHtml;
    if (!t.started_at) {
      actionHtml = `<div class="card center">
        <p class="muted" style="margin-bottom:10px">⏱️ Start karne ke baad aapke paas screenshot submit karne ke liye sirf <b>1 ghanta (60 minute)</b> hoga. Waqt khatam hone par ye task invalid ho jayega.</p>
        <button class="btn btn-primary" id="startBtn">🚀 Start Task</button>
      </div>`;
    } else if (expired) {
      actionHtml = `<div class="card center">
        <div style="font-size:40px">⏰</div>
        <p style="margin-top:8px;color:var(--red);font-weight:700">Waqt khatam! Ye task invalid ho gaya hai.</p>
        <p class="muted" style="margin:6px 0 12px">1 ghante ke andar screenshot submit nahi hua. Dobara start karke try karein.</p>
        <button class="btn btn-primary" id="restartBtn">🔄 Dobara Start Karein</button>
      </div>`;
    } else {
      actionHtml = `<div class="card center">
          <p class="muted">⏱️ Baaki waqt</p>
          <div class="bignum" id="timerDisplay" style="font-size:26px">--:--</div>
          <p class="muted" style="margin-top:6px;font-size:12px">Is waqt ke andar screenshot submit kar dein, warna task invalid ho jayega.</p>
        </div>
        <div class="card"><h3 style="margin-bottom:4px">📤 Upload Task Proof</h3>
          <p class="muted" style="margin-bottom:10px">Upload up to 3 screenshots as proof.</p>
          <form id="pf">
            <input type="file" id="file" class="field" accept="image/*" multiple required style="margin-bottom:12px">
            <button class="btn" style="background:#16a34a;color:#fff" id="btn">📤 Upload Proof</button>
          </form>
        </div>`;
    }

    mount(header({title:"Task Details",emoji:"📋",subtitle:t.title,back:"#/tasks"})+
    `<div style="padding:0 16px">${infoBlock(t)}${actionHtml}</div>`);

    if (!t.started_at) {
      qs("#startBtn").addEventListener("click", async ()=>{
        const b=qs("#startBtn"); b.disabled=true; b.textContent="Starting…";
        try{ await api("/tasks/"+id+"/start",{method:"POST"}); load(); }
        catch(err){ toast(err.message); b.disabled=false; b.textContent="🚀 Start Task"; }
      });
      return;
    }
    if (expired) {
      qs("#restartBtn").addEventListener("click", async ()=>{
        const b=qs("#restartBtn"); b.disabled=true; b.textContent="Starting…";
        try{ await api("/tasks/"+id+"/start",{method:"POST"}); load(); }
        catch(err){ toast(err.message); b.disabled=false; b.textContent="🔄 Dobara Start Karein"; }
      });
      return;
    }

    function tick(){
      if (!location.hash.startsWith("#/task?id="+id) && location.hash !== "#/task") { clearInterval(countdownTimer); countdownTimer=null; return; }
      const remain = ONE_HOUR_MS - (Date.now()-t.started_at);
      if (remain <= 0) { load(); return; }
      const mm=String(Math.floor(remain/60000)).padStart(2,"0");
      const ss=String(Math.floor((remain%60000)/1000)).padStart(2,"0");
      const el=qs("#timerDisplay"); if (el) el.textContent = mm+":"+ss;
    }
    tick();
    countdownTimer = setInterval(tick, 1000);

    qs("#pf").addEventListener("submit", async (e)=>{
      e.preventDefault();
      const files=[...qs("#file").files].slice(0,3);
      if(!files.length){toast("Choose at least one screenshot");return;}
      const btn=qs("#btn"); btn.disabled=true; btn.textContent="Uploading…";
      try{
        const fd=new FormData();
        files.forEach(f=>fd.append("proof", f));
        await api("/tasks/"+id+"/proof",{method:"POST",form:fd});
        if (countdownTimer) { clearInterval(countdownTimer); countdownTimer=null; }
        toast("Proof submitted! Awaiting review.");
        setTimeout(()=>{location.hash="#/proofs"; router();},800);

            <input type="checkbox" id="s-task-approval-on" ${s.taskCreationApprovalRequired?"checked":""} style="width:22px;height:22px"></label>
          <label class="label">Message shown to users</label>
          <textarea class="field" id="s-task-approval-msg" rows="2" style="margin-bottom:12px">${s.taskCreationApprovalMessage||""}</textarea>
          <button class="btn" style="background:#f59e0b;color:#fff" onclick="adminSaveTaskApproval()">💾 Save Task Approval Settings</button>
        </div>
        <div class="card"><h3 style="margin-bottom:10px">🛠️ Maintenance Mode</h3>
          <p class="muted" style="margin-bottom:10px">When ON, regular users see a maintenance page instead of the app. Admin login still works.</p>
          <label class="row" style="margin-bottom:12px;cursor:pointer">
            <span>Maintenance mode is currently <b>${s.maintenanceMode?"ON":"OFF"}</b></span>
            <input type="checkbox" id="s-maint-on" ${s.maintenanceMode?"checked":""} style="width:22px;height:22px"></label>
          <label class="label">Message shown to users</label>
          <textarea class="field" id="s-maint-msg" rows="2" style="margin-bottom:12px">${s.maintenanceMessage||""}</textarea>
          <button class="btn" style="background:#f59e0b;color:#fff" onclick="adminSaveMaintenance()">💾 Save Maintenance Settings</button>
        </div>`));
    }catch(err){ mount(shell(errorBox(err.message))); }
  }
  function render(){
    ({overview:panelOverview, users:panelUsers, tasks:panelTasks, proofs:panelProofs,
      dep:panelDep, wd:panelWd, coupon:panelCoupon, settings:panelSettings}[active])();
  }
  render();
}

/* ================= ROUTER ================= */
const ROUTES = {
  "/": pageLogin, "/home": pageIndex, "/login": pageLogin, "/register": pageRegister, "/dashboard": pageDashboard,
  "/tasks": pageTasks, "/task": pageTask, "/create-task": pageCreateTask, "/proofs": pageProofs,
  "/manage": pageManage, "/deposit": pageDeposit, "/withdraw": pageWithdraw, "/vip": pageVip,
  "/spin": pageSpin, "/streak": pageStreak, "/coupon": pageCoupon, "/invite": pageInvite, "/admin": pageAdmin, "/profile": pageProfile, "/notifications": pageNotifications,
};
async function router(){
  const { route } = hashParts();
  window.scrollTo(0,0);
  let settings = null;
  try { settings = await api("/public/settings"); } catch(e) { settings = null; }
  if (settings && settings.maintenanceMode && !isCurrentUserAdmin() && route !== "/login") {
    mount(`<div class="grad header-block center" style="padding:60px 24px;min-height:100vh">
      <div style="font-size:50px;margin-bottom:14px">🛠️</div>
      <h1 style="font-size:22px;margin-bottom:10px">We'll be right back!</h1>
      <p style="opacity:.9">${settings.maintenanceMessage||"We're doing some quick maintenance. Please check back soon!"}</p>
      <a href="#/login" style="display:inline-block;margin-top:22px;color:#fff;opacity:.8;font-size:13px;text-decoration:underline">Admin Login</a>
    </div>`);
    return;
  }
  (ROUTES[route] || pageLogin)();
}
window.addEventListener("hashchange", router);
(async function(){
  await initAuth();
  router();
})();
</script>
