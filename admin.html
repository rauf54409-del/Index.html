<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel - EarnPkrauf</title>
<meta name="description" content="EarnPkrauf admin panel." />
<style>:root{  --primary:#1d6cf5; --primary-d:#155ad1; --bg:#f4f7fb; --card:#ffffff;  --text:#0f1b2d; --muted:#6b7a90; --border:#e6ecf5; --green:#1aa251;  --red:#e5484d; --shadow:0 8px 24px rgba(29,108,245,.10);}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:84px}.grad{background:linear-gradient(135deg,#1d6cf5,#0d4fd0);color:#fff}.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px}.topbar .brand{font-weight:800;font-size:18px;color:var(--primary)}.btn{border:none;border-radius:16px;padding:13px 18px;font-weight:700;font-size:15px;cursor:pointer;width:100%;display:block;text-align:center}.btn:disabled{opacity:.6;cursor:not-allowed}.btn-primary{background:var(--primary);color:#fff}.btn-primary:active{background:var(--primary-d)}.btn-white{background:#fff;color:var(--primary)}.btn-danger{background:var(--red);color:#fff}.btn-dark{background:#0f1b2d;color:#fff}.pill{border-radius:999px;padding:8px 18px;font-weight:700;font-size:14px;display:inline-block}.card{background:var(--card);border-radius:20px;padding:18px;box-shadow:var(--shadow);margin:12px 16px}.soft{background:var(--card);border-radius:20px;padding:18px;box-shadow:var(--shadow)}.press{transition:transform .08s}.press:active{transform:scale(.97)}.muted{color:var(--muted);font-size:13px}.label{display:block;font-size:13px;font-weight:600;margin:0 0 6px}.field{width:100%;border:1px solid var(--border);border-radius:14px;padding:12px 14px;font-size:15px;background:#fff;outline:none;font-family:inherit}.field:focus{border-color:var(--primary)}h1,h2,h3{margin:0}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.emoji{font-size:30px}a{color:inherit;text-decoration:none}.center{text-align:center}.row{display:flex;align-items:center;justify-content:space-between}.hidden{display:none!important}.bignum{font-size:30px;font-weight:800;color:var(--primary)}.header-block{margin:8px 16px;border-radius:26px;padding:22px}.back{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:12px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px}.tabbar{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 10px;z-index:50}.tabbar a{flex:1;text-align:center;font-size:11px;color:var(--muted);font-weight:600}.tabbar a .ic{font-size:20px;display:block}.tabbar a.active{color:var(--primary)}.list-item{border-bottom:1px solid var(--border);padding:10px 0}.list-item:last-child{border:none}.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}.b-pending{background:#fff4e0;color:#b7791f}.b-ok{background:#e4f7ec;color:var(--green)}.b-no{background:#fde8e8;color:var(--red)}.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#0f1b2d;color:#fff;padding:12px 18px;border-radius:14px;font-size:14px;z-index:99;opacity:0;transition:.3s;max-width:90%;pointer-events:none}.toast.show{opacity:1}.notif-dot{position:absolute;top:2px;right:2px;width:9px;height:9px;background:#ef4444;border-radius:50%;border:2px solid var(--primary)}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}.modal-box{background:#fff;border-radius:20px;padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3)}.stat{background:rgba(255,255,255,.15);border-radius:16px;padding:12px;text-align:center}.method-btn{border:1px solid var(--border);border-radius:14px;padding:10px;font-size:13px;font-weight:600;background:#fff;cursor:pointer}.method-btn.sel{background:var(--primary);color:#fff;border-color:var(--primary)}.spin-wheel{width:220px;height:220px;border-radius:50%;margin:0 auto;border:10px solid var(--primary);  background:conic-gradient(#1d6cf5 0 45deg,#e8f0ff 45deg 90deg,#1d6cf5 90deg 135deg,#e8f0ff 135deg 180deg,#1d6cf5 180deg 225deg,#e8f0ff 225deg 270deg,#1d6cf5 270deg 315deg,#e8f0ff 315deg 360deg);  display:flex;align-items:center;justify-content:center;font-size:40px;transition:transform 3s cubic-bezier(.17,.67,.24,1)}.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:24px auto}@keyframes spin{to{transform:rotate(360deg)}}.tag{display:inline-block;font-size:11px;background:#e8f0ff;color:var(--primary);padding:3px 10px;border-radius:999px;font-weight:700}.a-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 16px 4px;-webkit-overflow-scrolling:touch}.a-tabs button{flex:0 0 auto;border:none;background:#fff;color:var(--muted);font-weight:700;font-size:13px;padding:9px 14px;border-radius:999px;box-shadow:var(--shadow);cursor:pointer;white-space:nowrap}.a-tabs button.active{background:var(--primary);color:#fff}.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px}.kpi .soft{margin:0;padding:14px}.proof-shot{width:100%;max-height:220px;object-fit:cover;border-radius:14px;margin:8px 0;display:block;background:var(--bg)}.u-row{border-bottom:1px solid var(--border);padding:12px 0}.u-row:last-child{border:none}.u-row .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}.demo-bar{background:#0f1b2d;color:#fff;font-size:11px;text-align:center;padding:6px 10px}.demo-bar b{color:#8fb4ff}.demo-bar button{background:none;border:1px solid rgba(255,255,255,.35);color:#fff;font-size:10px;padding:3px 8px;border-radius:999px;margin-left:8px;cursor:pointer}/* ---------------- parallax system (applies on every page/section) ---------------- */#px-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}#px-bg span{position:absolute;border-radius:50%;filter:blur(40px);opacity:.35;will-change:transform}#px-bg span.b1{width:260px;height:260px;background:#1d6cf5;top:-80px;left:-60px}#px-bg span.b2{width:220px;height:220px;background:#8fb4ff;top:40vh;right:-80px}#px-bg span.b3{width:300px;height:300px;background:#0d4fd0;bottom:-100px;left:-40px}.app{position:relative;z-index:1;background:transparent!important}body{background:var(--bg)}.header-block{position:relative;overflow:hidden}.header-block .px-orb{position:absolute;border-radius:50%;background:rgba(255,255,255,.16);will-change:transform;pointer-events:none}.header-block .px-orb.o1{width:130px;height:130px;top:-50px;right:-30px}.header-block .px-orb.o2{width:80px;height:80px;bottom:-30px;left:-20px}.header-block>*{position:relative;z-index:1}@media (prefers-reduced-motion: reduce){  #px-bg span,.header-block .px-orb{transform:none!important;transition:none!important}}</style>
</head><body>
<div id="px-bg"><span class="b1"></span><span class="b2"></span><span class="b3"></span></div>
<div class="app" id="app"><div class="spinner"></div></div>
<script src="parallax.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<script>
function pageAdmin(){  if(!requireAuth()) return;  const TABS=[["overview","📊","Overview"],["users","👥","Users"],["tasks","📋","Tasks"],    ["proofs","📤","Proofs"],["dep","💳","Deposits"],["wd","💰","Withdrawals"],["coupon","🎁","Coupons"],["settings","⚙️","Settings"]];  let active="overview";  function tabsBar(){    return `<div class="a-tabs">${TABS.map(([k,e,l])=>      `<button class="${active===k?'active':''}" onclick="adminSetTab('${k}')">${e} ${l}</button>`).join("")}</div>`;  }  window.adminSetTab=function(k){ active=k; render(); };  window.adminAct=async function(type,id,approve){    try{      const map={dep:"/admin/deposit/",wd:"/admin/withdraw/",proof:"/admin/proof/"};      await api(map[type]+id+"/review",{method:"POST",body:{approve}});      toast(approve?"Approved ✓":"Rejected");      render();    }catch(err){ toast(err.message); }  };  function kpi(l,v){return `<div class="soft center"><div class="muted">${l}</div><div class="bignum" style="font-size:19px">${v}</div></div>`;}  function fmtDate(s){ if(!s) return "—"; const d=new Date(s); return isNaN(d)?String(s):d.toLocaleDateString(); }  function shell(inner){    return header({title:"Admin Panel",emoji:"🛡️",subtitle:"Manage platform operations",back:"app.html#/dashboard"})+tabsBar()+`<div style="margin-top:8px">${inner}</div>`;  }  function loadingInto(){ mount(shell('<div class="spinner"></div>')); }  async function panelOverview(){    loadingInto();    try{      const o=await api("/admin/overview");      mount(shell(`      <div class="kpi">        ${kpi("Total Users",(o.totalUsers||0).toLocaleString())}        ${kpi("Total Tasks",(o.totalTasks||0).toLocaleString())}        ${kpi("Total Task Value",rs(o.totalTaskValue||0))}        ${kpi("Total Paid Out",rs(o.totalPaidOut||0))}        ${kpi("Pending Deposits",(o.pendingDeposits||0)+" • "+rs(o.pendingDepositsAmount||0))}        ${kpi("Pending Withdrawals",(o.pendingWithdrawals||0)+" • "+rs(o.pendingWithdrawalsAmount||0))}        ${kpi("Pending Proofs",(o.pendingProofs||0).toLocaleString())}        ${kpi("VIP Members",(o.vipMembers||0).toLocaleString())}      </div>`));    }catch(err){ mount(shell(errorBox(err.message))); }  }  window.adminBlock=async function(id, block){    try{ await api("/admin/user/"+id+"/block",{method:"POST",body:{block}}); toast(block?"User blocked":"User unblocked"); panelUsers(); }    catch(err){ toast(err.message); }  };  window.adminViewEarnings=async function(id){    try{      const e = await api("/admin/user/"+id+"/earnings");      const b = e.breakdown||{}, c = e.counts||{};      const row=(l,v,n)=>`<div class="row" style="padding:6px 0;border-bottom:1px solid var(--border)"><span>${l} <span class="muted" style="font-size:11px">(${n})</span></span><b>${rs(v)}</b></div>`;      const el=document.createElement("div");      el.className="modal-overlay";      el.innerHTML=`<div class="modal-box" style="text-align:left">        <h2 style="margin-bottom:2px">📊 ${e.name}</h2>        <p class="muted" style="margin-bottom:14px">${e.email}</p>        ${row("📋 Task rewards", b.taskEarnings||0, c.tasksCompleted||0)}        ${row("🎁 Coupon redeems", b.couponEarnings||0, c.couponsRedeemed||0)}        ${row("🎡 Spin wins", b.spinEarnings||0, c.spinsPlayed||0)}        ${row("🔥 Check-in rewards", b.checkinEarnings||0, c.checkinsDone||0)}        <div class="row" style="padding-top:10px"><b>Total Earnings</b><b class="bignum" style="font-size:18px">${rs(e.total_earnings||0)}</b></div>        <button class="btn btn-primary" id="ve-close" style="margin-top:16px">Close</button>      </div>`;      document.body.appendChild(el);      el.querySelector("#ve-close").onclick=()=>el.remove();    }catch(err){ toast(err.message); }  };  async function panelUsers(){    loadingInto();    try{      const list=await api("/admin/users");      const myId = currentUserId();      mount(shell(`<div class="card">        <div class="row" style="margin-bottom:6px"><h3>All Users</h3><span class="muted">${(list||[]).length} total</span></div>        ${(list&&list.length)? list.map(u=>`          <div class="u-row">            <div class="row"><b>${u.name}</b><span class="muted">${u.vip_level?("👑 VIP "+u.vip_level):"Free"}${u.is_blocked?' <span class="badge b-no">BLOCKED</span>':''}</span></div>            <div class="muted">${u.email}</div>            <div class="tags">              <span class="tag">✅ ${u.completed_tasks||0} tasks done</span>              <span class="tag">💰 ${rs(u.total_earnings||0)} earned</span>              <span class="tag">💳 ${rs(u.deposit_balance||0)} deposit</span>              <span class="tag">👛 ${rs(u.available_balance||0)} available</span>              <span class="tag">👥 ${u.referrals_count||0} referrals</span>              <span class="tag">🔥 streak ${u.streak||0}</span>              ${u.payment_method?`<span class="tag">🏦 ${u.payment_method}: ${u.payment_account_number} (${u.payment_account_title||"—"})</span>`:''}            </div>            <div class="muted" style="margin-top:4px;font-size:11px">Joined ${fmtDate(u.created_at)}</div>            <div class="row" style="margin-top:8px;gap:8px">              <button class="pill" style="border:none;cursor:pointer;background:#e8f0ff;color:var(--primary)" onclick="adminViewEarnings('${u.id}')">📊 Earnings Breakdown</button>              ${u.id!==myId?`<button class="pill ${u.is_blocked?'b-ok':'b-no'}" style="border:none;cursor:pointer" onclick="adminBlock('${u.id}',${!u.is_blocked})">${u.is_blocked?'✓ Unblock User':'🚫 Block User'}</button>`:''}            </div>          </div>`).join("") : '<p class="muted">No users yet.</p>'}      </div>`));    }catch(err){ mount(shell(errorBox(err.message))); }  }  window.adminToggleTask=async function(id, active){    try{ await api("/admin/task/"+id+"/toggle",{method:"POST",body:{active}}); toast(active?"Task activated":"Task deactivated"); panelTasks(); }    catch(err){ toast(err.message); }  };  async function panelTasks(){    loadingInto();    try{      const list=await api("/admin/tasks");      mount(shell(`<div class="card">        <div class="row" style="margin-bottom:6px"><h3>All Tasks</h3><span class="muted">${(list||[]).length} total</span></div>        ${(list&&list.length)? list.map(t=>{          const total=t.total_slots||0, left=t.slots_left??0;          const value=(t.reward||0)*total, spent=(t.reward||0)*(t.completed_count||0);          return `<div class="u-row">            <div class="row"><b>${t.title}</b><span class="badge ${t.active===false?'b-no':'b-ok'}">${t.active===false?'inactive':'active'}</span></div>            <div class="muted">by ${t.created_by_name||"—"} • ${fmtDate(t.created_at)}</div>            <div class="tags">              <span class="tag">💵 ${rs(t.reward)} / slot</span>              <span class="tag">🎟️ ${t.completed_count||0}/${total} done (${left} left)</span>              <span class="tag">📦 ${rs(value)} total value</span>              <span class="tag">💸 ${rs(spent)} paid out</span>              <span class="tag">${t.min_vip_level?("👑 VIP "+t.min_vip_level+"+ only"):"🌐 Everyone"}</span>            </div>            <button class="pill ${t.active===false?'b-ok':'b-no'}" style="border:none;cursor:pointer;margin-top:8px" onclick="adminToggleTask('${t.id}',${t.active===false})">${t.active===false?'✓ Activate':'⏸ Deactivate'}</button>          </div>`;}).join("") : '<p class="muted">No tasks yet.</p>'}      </div>`));    }catch(err){ mount(shell(errorBox(err.message))); }  }  async function panelProofs(){    loadingInto();    try{      const d=await api("/admin/proofs");      const pr=(d&&d.proofs)||[];      mount(shell(`<div class="card"><h3 style="margin-bottom:10px">📤 Pending Proof Screenshots</h3>        ${pr.length? pr.map(x=>`          <div class="list-item" id="proof-${x.id}">            <div class="row"><b>${x.user_name}</b><span class="muted">${rs(x.reward)}</span></div>            <div class="muted">${x.task_title}</div>            ${x.proof_url?`<a href="${x.proof_url}" target="_blank"><img class="proof-shot" src="${x.proof_url}" alt="proof screenshot" loading="lazy"></a>`:'<p class="muted">No screenshot attached.</p>'}            <div class="row" style="margin-top:6px">              <button class="pill b-ok" style="border:none;cursor:pointer;margin-right:6px" onclick="adminAct('proof','${x.id}',true)">✓ Approve</button>              <button class="pill b-no" style="border:none;cursor:pointer" onclick="adminAct('proof','${x.id}',false)">✕ Reject</button>            </div>          </div>`).join("") : '<p class="muted">No pending proofs.</p>'}      </div>`));    }catch(err){ mount(shell(errorBox(err.message))); }  }  async function panelDep(){    loadingInto();    try{      const d=await api("/admin/deposits");      const dep=(d&&d.deposits)||[];      mount(shell(`<div class="card"><h3 style="margin-bottom:10px">💳 Pending Deposits</h3>        ${dep.length?dep.map(x=>`          <div class="list-item" id="dep-${x.id}">            <div class="row"><b>${x.user_name}</b><span class="muted">${rs(x.amount)}</span></div>            <div class="muted">${x.method} • from ${x.account_number} • Txn ID: ${x.txn_ref||"—"}</div>            ${x.screenshot?`<a href="${x.screenshot}" target="_blank"><img class="proof-shot" src="${x.screenshot}" alt="deposit screenshot" loading="lazy"></a>`:'<p class="muted">No screenshot attached.</p>'}            <div class="row" style="margin-top:6px">              <button class="pill b-ok" style="border:none;cursor:pointer;margin-right:6px" onclick="adminAct('dep','${x.id}',true)">✓ Approve</button>              <button class="pill b-no" style="border:none;cursor:pointer" onclick="adminAct('dep','${x.id}',false)">✕ Reject</button>            </div>          </div>`).join(""):'<p class="muted">None</p>'}</div>`));    }catch(err){ mount(shell(errorBox(err.message))); }  }  async function panelWd(){    loadingInto();    try{      const d=await api("/admin/withdrawals");      const wd=(d&&d.withdrawals)||[];      mount(shell(`<div class="card"><h3 style="margin-bottom:10px">💰 Pending Withdrawals</h3>        ${wd.length?wd.map(x=>`          <div class="list-item" id="wd-${x.id}">            <div class="row"><b>${x.user_name}</b>${x.is_vip?'<span class="badge b-ok">⭐ VIP Priority</span>':''}</div>            <div class="tags" style="margin-top:6px">              <span class="tag">Requested: ${rs(x.amount)}</span>              <span class="tag">Tax: ${rs(x.tax)}</span>              <span class="tag">💸 Pay: ${rs(x.net_amount)}</span>            </div>            <div class="muted" style="margin-top:6px">Form entry: ${x.method} • ${x.account_number}</div>            ${x.bound_method?`<div class="muted" style="font-size:12px">Registered account: ${x.bound_method} • ${x.bound_account} (${x.bound_title||"—"}) ${x.bound_account===x.account_number?'✅ matches':'⚠️ different!'}</div>`              :`<div class="muted" style="font-size:12px">⚠️ No bound account on file — verify manually.</div>`}            <div class="row" style="margin-top:8px">              <button class="pill b-ok" style="border:none;cursor:pointer;margin-right:6px" onclick="adminAct('wd','${x.id}',true)">✓ Approve</button>              <button class="pill b-no" style="border:none;cursor:pointer" onclick="adminAct('wd','${x.id}',false)">✕ Reject</button>            </div>          </div>`).join(""):'<p class="muted">None</p>'}</div>`));    }catch(err){ mount(shell(errorBox(err.message))); }  }  function panelCoupon(){    mount(shell(`<div class="card"><h3 style="margin-bottom:10px">🎁 Create Coupon</h3>      <form id="cf">        <label class="label">Code</label><input class="field" id="c-code" placeholder="CODE" required style="margin-bottom:10px">        <label class="label">Amount (Rs)</label><input class="field" id="c-amt" type="number" required style="margin-bottom:10px">        <label class="label">Max uses</label><input class="field" id="c-max" type="number" value="100" style="margin-bottom:12px">        <button class="btn btn-primary" id="c-btn">Create Coupon</button>      </form></div>`));    qs("#cf").addEventListener("submit", async (e)=>{      e.preventDefault();      const b=qs("#c-btn"); b.disabled=true; b.textContent="Creating…";      try{        await api("/admin/coupon",{method:"POST",body:{code:qs("#c-code").value.toUpperCase(),amount:+qs("#c-amt").value,max_uses:+qs("#c-max").value}});        toast("Coupon created ✓"); qs("#c-code").value=""; qs("#c-amt").value="";      }catch(err){ toast(err.message); }      b.disabled=false; b.textContent="Create Coupon";    });  }  window.adminAddDeposit=async function(){    const method=qs("#s-dep-method").value, number=qs("#s-dep-num").value, title=qs("#s-dep-title").value;    if(!number||!title){toast("Fill account number & title");return;}    try{ await api("/admin/settings/deposit-account",{method:"POST",body:{method,number,title}}); toast("Added ✓"); panelSettings(); }    catch(err){ toast(err.message); }  };  window.adminDelDeposit=async function(idx){    try{ await api("/admin/settings/deposit-account/"+idx,{method:"DELETE"}); toast("Removed"); panelSettings(); }    catch(err){ toast(err.message); }  };  window.adminAddWdMethod=async function(){    const name=qs("#s-wd-name").value.trim();    if(!name){toast("Enter a method name");return;}    try{ await api("/admin/settings/withdrawal-method",{method:"POST",body:{name}}); toast("Added ✓"); panelSettings(); }    catch(err){ toast(err.message); }  };  window.adminDelWdMethod=async function(idx){    try{ await api("/admin/settings/withdrawal-method/"+idx,{method:"DELETE"}); toast("Removed"); panelSettings(); }    catch(err){ toast(err.message); }  };  window.adminSaveTaskApproval=async function(){    const on=qs("#s-task-approval-on").checked, message=qs("#s-task-approval-msg").value;    try{ await api("/admin/settings/task-approval",{method:"POST",body:{on,message}}); toast(on?"Task approval requirement ON":"Task approval requirement OFF"); panelSettings(); }    catch(err){ toast(err.message); }  };  window.adminSaveMaintenance=async function(){    const on=qs("#s-maint-on").checked, message=qs("#s-maint-msg").value;    try{ await api("/admin/settings/maintenance",{method:"POST",body:{on,message}}); toast(on?"Maintenance mode ON":"Maintenance mode OFF"); panelSettings(); }    catch(err){ toast(err.message); }  };  window.adminSaveSupportUrl=async function(){    const url=qs("#s-support-url").value.trim();    try{ await api("/admin/settings/support-url",{method:"POST",body:{url}}); toast("Support link saved"); panelSettings(); }    catch(err){ toast(err.message); }  };  async function panelSettings(){    loadingInto();    try{      const s=await api("/admin/settings");      mount(shell(`        <div class="card"><h3 style="margin-bottom:10px">💳 Deposit Accounts</h3>          <p class="muted" style="margin-bottom:10px">Accounts users see on the Deposit page.</p>          ${(s.depositAccounts||[]).map((a,i)=>`<div class="list-item row"><span><b>${a.method}</b> — ${a.number} <span class="muted">(${a.title})</span></span>            <button class="pill b-no" style="border:none;cursor:pointer" onclick="adminDelDeposit(${i})">✕ Remove</button></div>`).join("")}          <div class="grid3" style="margin-top:12px;gap:8px">            <input class="field" id="s-dep-method" placeholder="Method (e.g. JazzCash)">            <input class="field" id="s-dep-num" placeholder="Account number">            <input class="field" id="s-dep-title" placeholder="Account title"></div>          <button class="btn btn-primary" style="margin-top:10px" onclick="adminAddDeposit()">+ Add Deposit Account</button>        </div>        <div class="card"><h3 style="margin-bottom:10px">💰 Withdrawal Methods</h3>          <p class="muted" style="margin-bottom:10px">Methods users can choose when withdrawing / binding their account.</p>          ${(s.withdrawalMethods||[]).map((m,i)=>`<div class="list-item row"><span>${m}</span>            <button class="pill b-no" style="border:none;cursor:pointer" onclick="adminDelWdMethod(${i})">✕ Remove</button></div>`).join("")}          <div class="row" style="margin-top:12px;gap:8px">            <input class="field" id="s-wd-name" placeholder="e.g. Bank Alfalah" style="flex:1">            <button class="btn btn-primary" style="width:auto;padding:0 16px" onclick="adminAddWdMethod()">+ Add</button></div>        </div>        <div class="card"><h3 style="margin-bottom:10px">📞 Support Link</h3>          <p class="muted" style="margin-bottom:10px">The Telegram (or any) link users are sent to when they tap "Contact Support".</p>          <input class="field" id="s-support-url" value="${s.supportUrl||""}" placeholder="https://t.me/yourchannel" style="margin-bottom:12px">          <button class="btn" style="background:#0088cc;color:#fff" onclick="adminSaveSupportUrl()">💾 Save Support Link</button>        </div>        <div class="card"><h3 style="margin-bottom:10px">➕ Create Task Approval</h3>          <p class="muted" style="margin-bottom:10px">When ON, users see a message asking them to contact customer service instead of the Create Task form.</p>          <label class="row" style="margin-bottom:12px;cursor:pointer">            <span>Approval requirement is currently <b>${s.taskCreationApprovalRequired?"ON":"OFF"}</b></span>            <input type="checkbox" id="s-task-approval-on" ${s.taskCreationApprovalRequired?"checked":""} style="width:22px;height:22px"></label>          <label class="label">Message shown to users</label>          <textarea class="field" id="s-task-approval-msg" rows="2" style="margin-bottom:12px">${s.taskCreationApprovalMessage||""}</textarea>          <button class="btn" style="background:#f59e0b;color:#fff" onclick="adminSaveTaskApproval()">💾 Save Task Approval Settings</button>        </div>        <div class="card"><h3 style="margin-bottom:10px">🛠️ Maintenance Mode</h3>          <p class="muted" style="margin-bottom:10px">When ON, regular users see a maintenance page instead of the app. Admin login still works.</p>          <label class="row" style="margin-bottom:12px;cursor:pointer">            <span>Maintenance mode is currently <b>${s.maintenanceMode?"ON":"OFF"}</b></span>            <input type="checkbox" id="s-maint-on" ${s.maintenanceMode?"checked":""} style="width:22px;height:22px"></label>          <label class="label">Message shown to users</label>          <textarea class="field" id="s-maint-msg" rows="2" style="margin-bottom:12px">${s.maintenanceMessage||""}</textarea>          <button class="btn" style="background:#f59e0b;color:#fff" onclick="adminSaveMaintenance()">💾 Save Maintenance Settings</button>        </div>`));    }catch(err){ mount(shell(errorBox(err.message))); }  }  function render(){    ({overview:panelOverview, users:panelUsers, tasks:panelTasks, proofs:panelProofs,      dep:panelDep, wd:panelWd, coupon:panelCoupon, settings:panelSettings}[active])();  }  render();}
