<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Account - EarnPkrauf</title>
<meta name="description" content="Your EarnPkrauf dashboard - manage tasks, deposits, withdrawals, VIP, referrals and more." />
<style>:root{  --primary:#1d6cf5; --primary-d:#155ad1; --bg:#f4f7fb; --card:#ffffff;  --text:#0f1b2d; --muted:#6b7a90; --border:#e6ecf5; --green:#1aa251;  --red:#e5484d; --shadow:0 8px 24px rgba(29,108,245,.10);}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:84px}.grad{background:linear-gradient(135deg,#1d6cf5,#0d4fd0);color:#fff}.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px}.topbar .brand{font-weight:800;font-size:18px;color:var(--primary)}.btn{border:none;border-radius:16px;padding:13px 18px;font-weight:700;font-size:15px;cursor:pointer;width:100%;display:block;text-align:center}.btn:disabled{opacity:.6;cursor:not-allowed}.btn-primary{background:var(--primary);color:#fff}.btn-primary:active{background:var(--primary-d)}.btn-white{background:#fff;color:var(--primary)}.btn-danger{background:var(--red);color:#fff}.btn-dark{background:#0f1b2d;color:#fff}.pill{border-radius:999px;padding:8px 18px;font-weight:700;font-size:14px;display:inline-block}.card{background:var(--card);border-radius:20px;padding:18px;box-shadow:var(--shadow);margin:12px 16px}.soft{background:var(--card);border-radius:20px;padding:18px;box-shadow:var(--shadow)}.press{transition:transform .08s}.press:active{transform:scale(.97)}.muted{color:var(--muted);font-size:13px}.label{display:block;font-size:13px;font-weight:600;margin:0 0 6px}.field{width:100%;border:1px solid var(--border);border-radius:14px;padding:12px 14px;font-size:15px;background:#fff;outline:none;font-family:inherit}.field:focus{border-color:var(--primary)}h1,h2,h3{margin:0}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.emoji{font-size:30px}a{color:inherit;text-decoration:none}.center{text-align:center}.row{display:flex;align-items:center;justify-content:space-between}.hidden{display:none!important}.bignum{font-size:30px;font-weight:800;color:var(--primary)}.header-block{margin:8px 16px;border-radius:26px;padding:22px}.back{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:12px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:13px}.tabbar{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 10px;z-index:50}.tabbar a{flex:1;text-align:center;font-size:11px;color:var(--muted);font-weight:600}.tabbar a .ic{font-size:20px;display:block}.tabbar a.active{color:var(--primary)}.list-item{border-bottom:1px solid var(--border);padding:10px 0}.list-item:last-child{border:none}.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}.b-pending{background:#fff4e0;color:#b7791f}.b-ok{background:#e4f7ec;color:var(--green)}.b-no{background:#fde8e8;color:var(--red)}.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#0f1b2d;color:#fff;padding:12px 18px;border-radius:14px;font-size:14px;z-index:99;opacity:0;transition:.3s;max-width:90%;pointer-events:none}.toast.show{opacity:1}.notif-dot{position:absolute;top:2px;right:2px;width:9px;height:9px;background:#ef4444;border-radius:50%;border:2px solid var(--primary)}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}.modal-box{background:#fff;border-radius:20px;padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3)}.stat{background:rgba(255,255,255,.15);border-radius:16px;padding:12px;text-align:center}.method-btn{border:1px solid var(--border);border-radius:14px;padding:10px;font-size:13px;font-weight:600;background:#fff;cursor:pointer}.method-btn.sel{background:var(--primary);color:#fff;border-color:var(--primary)}.spin-wheel{width:220px;height:220px;border-radius:50%;margin:0 auto;border:10px solid var(--primary);  background:conic-gradient(#1d6cf5 0 45deg,#e8f0ff 45deg 90deg,#1d6cf5 90deg 135deg,#e8f0ff 135deg 180deg,#1d6cf5 180deg 225deg,#e8f0ff 225deg 270deg,#1d6cf5 270deg 315deg,#e8f0ff 315deg 360deg);  display:flex;align-items:center;justify-content:center;font-size:40px;transition:transform 3s cubic-bezier(.17,.67,.24,1)}.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:24px auto}@keyframes spin{to{transform:rotate(360deg)}}.tag{display:inline-block;font-size:11px;background:#e8f0ff;color:var(--primary);padding:3px 10px;border-radius:999px;font-weight:700}.a-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 16px 4px;-webkit-overflow-scrolling:touch}.a-tabs button{flex:0 0 auto;border:none;background:#fff;color:var(--muted);font-weight:700;font-size:13px;padding:9px 14px;border-radius:999px;box-shadow:var(--shadow);cursor:pointer;white-space:nowrap}.a-tabs button.active{background:var(--primary);color:#fff}.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px}.kpi .soft{margin:0;padding:14px}.proof-shot{width:100%;max-height:220px;object-fit:cover;border-radius:14px;margin:8px 0;display:block;background:var(--bg)}.u-row{border-bottom:1px solid var(--border);padding:12px 0}.u-row:last-child{border:none}.u-row .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}.demo-bar{background:#0f1b2d;color:#fff;font-size:11px;text-align:center;padding:6px 10px}.demo-bar b{color:#8fb4ff}.demo-bar button{background:none;border:1px solid rgba(255,255,255,.35);color:#fff;font-size:10px;padding:3px 8px;border-radius:999px;margin-left:8px;cursor:pointer}/* ---------------- parallax system (applies on every page/section) ---------------- */#px-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}#px-bg span{position:absolute;border-radius:50%;filter:blur(40px);opacity:.35;will-change:transform}#px-bg span.b1{width:260px;height:260px;background:#1d6cf5;top:-80px;left:-60px}#px-bg span.b2{width:220px;height:220px;background:#8fb4ff;top:40vh;right:-80px}#px-bg span.b3{width:300px;height:300px;background:#0d4fd0;bottom:-100px;left:-40px}.app{position:relative;z-index:1;background:transparent!important}body{background:var(--bg)}.header-block{position:relative;overflow:hidden}.header-block .px-orb{position:absolute;border-radius:50%;background:rgba(255,255,255,.16);will-change:transform;pointer-events:none}.header-block .px-orb.o1{width:130px;height:130px;top:-50px;right:-30px}.header-block .px-orb.o2{width:80px;height:80px;bottom:-30px;left:-20px}.header-block>*{position:relative;z-index:1}@media (prefers-reduced-motion: reduce){  #px-bg span,.header-block .px-orb{transform:none!important;transition:none!important}}</style>
</head><body>
<div id="px-bg"><span class="b1"></span><span class="b2"></span><span class="b3"></span></div>
<div class="app" id="app"><div class="spinner"></div></div>
<script src="parallax.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<script>
function pageDashboard(){  if(!requireAuth()) return;  const ACTIONS=[    ["#/deposit","💳","Deposit","Add funds"],["#/withdraw","💰","Withdraw","Cash out"],    ["#/tasks","📋","Tasks","Earn money"],["#/create-task","➕","Create Task","Post job"],    ["#/proofs","📤","My Proofs","Submissions"],["#/manage","🛠️","Manage","Your tasks"],    ["#/coupon","🎁","Redeem Coupon","Bonus"],["#/streak","🔥","Streak","Daily reward"],    ["#/spin","🎡","Spin","Win rewards"],["#/invite","👥","Invite","Earn bonus"]];  function dstat(l,v){return `<div class="soft center" style="margin:0"><div class="muted">${l}</div><div class="bignum" style="font-size:20px">${v}</div></div>`}  function view(d, notif, settings){    const p=(d&&d.profile)||{}, w=(d&&d.withdrawals)||[];    const unseen=(notif&&notif.unseen)||0;    mount(`    <div class="grad header-block" style="padding:22px">      <div class="row"><p style="opacity:.9">Welcome Back 👋</p>        <span class="row" style="gap:8px">          <a href="#/notifications" class="pill" style="width:auto;position:relative;background:rgba(255,255,255,.2);color:#fff;padding:6px 12px;font-size:14px">🔔${unseen?'<span class="notif-dot"></span>':''}</a>          <a href="#/profile" class="pill" style="width:auto;background:rgba(255,255,255,.2);color:#fff;padding:6px 14px;font-size:12px">👤 My Profile</a>        </span></div>      <h1 style="font-size:26px;font-weight:800">${p.name||"User"}</h1>      <div style="margin-top:14px" class="grid2">        <div style="background:#fff;color:var(--text);border-radius:16px;padding:14px;text-align:center">          <div class="muted">💳 Deposit</div><div class="bignum" style="font-size:22px">${rs(p.deposit_balance)}</div></div>        <div style="background:#fff;color:var(--text);border-radius:16px;padding:14px;text-align:center">          <div class="muted">💰 Available</div><div class="bignum" style="font-size:22px">${rs(p.available_balance)}</div></div>      </div>    </div>    <div class="grid2" style="margin:12px 16px">      ${dstat("Total Earnings",rs(p.total_earnings))}${dstat("Completed",p.completed_tasks||0)}      ${dstat("Referrals",p.referrals_count||0)}${dstat("Pending",rs(p.pending_balance))}    </div>    <h2 style="margin:16px 16px 8px;font-size:19px">🚀 Quick Actions</h2>    <div class="grid2" style="margin:0 16px">      ${ACTIONS.map(([h,e,t,ds])=>`<a href="${h}" class="soft press" style="margin:0"><div class="emoji">${e}</div><b>${t}</b><div class="muted">${ds}</div></a>`).join("")}      <a href="#/vip" class="soft press" style="margin:0;grid-column:span 2"><div class="emoji">👑</div><b>VIP</b><div class="muted">Upgrade your account</div></a>    </div>    ${d&&d.isAdmin?`<a href="admin.html#/admin" class="card press row"><div><b>🛡️ Admin Panel</b><div class="muted">Manage deposits, withdrawals & proofs</div></div><span>→</span></a>`:""}    <div class="card"><h2 style="font-size:16px">💬 Support</h2><p class="muted">Need help? Contact support.</p>      <a href="${(settings&&settings.supportUrl)||EARNPKR_CONFIG.SUPPORT_URL}" target="_blank" class="pill btn-primary" style="margin-top:10px;width:auto">📞 Contact Support</a></div>    <div class="card"><h2 style="font-size:16px;margin-bottom:8px">🎉 Latest Withdrawals</h2>      ${w.length? w.slice(0,5).map(x=>`<div class="list-item"><b>${rs(x.amount)}</b><div class="muted">${x.name} • ${x.method}</div></div>`).join("")        : '<p class="muted">No withdrawals yet.</p>'}</div>    <div style="margin:16px"><button class="btn btn-danger" id="logout">🚪 Logout</button></div>    ${tabbar("#/dashboard")}`);    qs("#logout").onclick=logout;  }  Promise.all([api("/dashboard"), api("/notifications").catch(()=>({unseen:0})), api("/public/settings").catch(()=>null)]).then(([d,n,s])=>view(d,n,s))    .catch(err=>mount(errorBox(err.message)+`<div style="margin:16px"><button class="btn btn-danger" onclick="logout()">Logout</button></div>`));}
function pageTasks(){  if(!requireAuth()) return;  function view(list){    list=list||[];    const items=list.map((t,i)=>{      const card=`<div class="soft" style="margin:0 0 12px;padding:16px">        <div class="row"><b style="font-size:16px">${t.title}</b>${t.min_vip_level?`<span class="badge b-ok">👑 VIP ${t.min_vip_level}+</span>`:''}</div>        <div class="grid2" style="margin-top:12px;gap:10px">          <div style="background:var(--bg);border-radius:14px;padding:10px;text-align:center"><div class="bignum" style="font-size:17px">${rs(t.reward)}</div><span class="muted" style="font-size:11px">Reward / User</span></div>          <div style="background:var(--bg);border-radius:14px;padding:10px;text-align:center"><div class="bignum" style="font-size:17px">${t.slots_left}</div><span class="muted" style="font-size:11px">Slots Left</span></div>          <div style="background:var(--bg);border-radius:14px;padding:10px;text-align:center"><div class="bignum" style="font-size:17px">${t.completed_count}</div><span class="muted" style="font-size:11px">Completed</span></div>          <div style="background:var(--bg);border-radius:14px;padding:10px;text-align:center"><div class="bignum" style="font-size:17px">${t.total_slots}</div><span class="muted" style="font-size:11px">Total Users</span></div>        </div>        <a href="#/task?id=${t.id}" class="btn btn-primary" style="margin-top:14px">🚀 Start Task</a>      </div>`;      const ad = (i>0 && (i+1)%3===0) ? adSlot("tasks-inline-"+i) : "";      return card+ad;    }).join("");    mount(header({title:"Tasks",emoji:"📋",subtitle:"Complete tasks to earn money"})+    `<div style="padding:0 16px">${adSlot("tasks-top")}${list.length? items : errorBox("No tasks available right now.")}</div>`+tabbar("#/tasks"));  }  api("/tasks").then(view).catch(err=>mount(header({title:"Tasks",emoji:"📋"})+errorBox(err.message)+tabbar("#/tasks")));}
function pageTask(){  if(!requireAuth()) return;  const id=getParam("id");  if(!id){ location.hash="#/tasks"; router(); return; }  const ONE_HOUR_MS = 60*60*1000;  let countdownTimer=null;  function infoBlock(t){    return `<div class="soft" style="padding:16px;margin-bottom:14px">        <b style="font-size:17px">${t.title}</b><div class="muted" style="font-size:12px">Task ID: #${t.id.slice(-6)}</div>        <div class="grid2" style="margin-top:12px;gap:10px">          <div style="background:var(--bg);border-radius:14px;padding:10px;text-align:center"><div class="bignum" style="font-size:17px">${rs(t.reward)}</div><span class="muted" style="font-size:11px">Reward</span></div>          <div style="background:var(--bg);border-radius:14px;padding:10px;text-align:center"><div class="bignum" style="font-size:17px">${t.slots_left}</div><span class="muted" style="font-size:11px">Slots Left</span></div>          <div style="background:var(--bg);border-radius:14px;padding:10px;text-align:center"><div class="bignum" style="font-size:17px">${t.completed_count}</div><span class="muted" style="font-size:11px">Completed Users</span></div>          <div style="background:var(--bg);border-radius:14px;padding:10px;text-align:center"><div class="bignum" style="font-size:17px">${t.total_slots}</div><span class="muted" style="font-size:11px">Total Users</span></div>        </div>      </div>      <div class="card"><h3 style="margin-bottom:6px">📝 Task Description</h3><p class="muted">${t.description||"—"}</p></div>      ${t.screenshots&&t.screenshots.length?`<div class="card"><h3 style="margin-bottom:10px">📷 Task Screenshots</h3>        <div class="row" style="flex-wrap:wrap;gap:8px">${t.screenshots.map(s=>`<img src="${s}" style="width:72px;height:72px;object-fit:cover;border-radius:10px">`).join("")}</div></div>`:""}      ${t.link?`<a href="${t.link}" target="_blank" class="btn btn-primary" style="margin:6px 0 14px;display:block">🔗 Open Task</a>`:""}`;  }  function view(t){    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer=null; }    if (t.already_done || t.expired) {      mount(header({title:"Task Details",emoji:"📋",subtitle:t.title,back:"#/tasks"})+      `<div style="padding:0 16px">${infoBlock(t)}        <div class="card center"><p class="muted">${t.expired          ? "⏰ Aap ne waqt ke andar screenshot submit nahi kiya, ye task hamesha ke liye invalid ho chuka hai. \"Tasks\" tab me naye tasks dekhein."          : "✅ Aap ye task pehle hi submit/complete kar chuke hain. \"Tasks\" tab me naye tasks dekhein."}</p></div>      </div>`);      return;    }    const startedAtMs = t.started_at ? new Date(t.started_at).getTime() : null;    const elapsed = startedAtMs ? (Date.now()-startedAtMs) : 0;    const localExpired = !!(startedAtMs && elapsed > ONE_HOUR_MS);    let actionHtml;    if (!startedAtMs) {      actionHtml = `<div class="card center">        <p class="muted" style="margin-bottom:10px">⏱️ Start karne ke baad aapke paas screenshot submit karne ke liye sirf <b>1 ghanta (60 minute)</b> hoga. Waqt khatam hone par ye task hamesha ke liye invalid ho jayega aur dobara kabhi show nahi hoga.</p>        <button class="btn btn-primary" id="startBtn">🚀 Start Task</button>      </div>`;    } else if (localExpired) {      actionHtml = `<div class="card center">        <div style="font-size:40px">⏰</div>        <p style="margin-top:8px;color:var(--red);font-weight:700">Waqt khatam! Ye task hamesha ke liye invalid ho gaya hai.</p>        <p class="muted" style="margin:6px 0 12px">1 ghante ke andar screenshot submit nahi hua. Ye task ab dobara start nahi ho sakta.</p>      </div>`;    } else {      actionHtml = `<div class="card center">          <p class="muted">⏱️ Baaki waqt</p>          <div class="bignum" id="timerDisplay" style="font-size:26px">--:--</div>          <p class="muted" style="margin-top:6px;font-size:12px">Is waqt ke andar screenshot submit kar dein, warna task hamesha ke liye invalid ho jayega.</p>        </div>        <div class="card"><h3 style="margin-bottom:4px">📤 Upload Task Proof</h3>          <p class="muted" style="margin-bottom:10px">Upload up to 3 screenshots as proof.</p>          <form id="pf">            <input type="file" id="file" class="field" accept="image/*" multiple required style="margin-bottom:12px">            <button class="btn" style="background:#16a34a;color:#fff" id="btn">📤 Upload Proof</button>          </form>        </div>`;    }    mount(header({title:"Task Details",emoji:"📋",subtitle:t.title,back:"#/tasks"})+    `<div style="padding:0 16px">${infoBlock(t)}${actionHtml}</div>`);    if (!startedAtMs) {      qs("#startBtn").addEventListener("click", async ()=>{        const b=qs("#startBtn"); b.disabled=true; b.textContent="Starting…";        try{ await api("/tasks/"+id+"/start",{method:"POST"}); load(); }        catch(err){ toast(err.message); b.disabled=false; b.textContent="🚀 Start Task"; }      });      return;    }    if (localExpired) {      return;    }    function tick(){      if (!location.hash.startsWith("#/task?id="+id) && location.hash !== "#/task") { clearInterval(countdownTimer); countdownTimer=null; return; }      const remain = ONE_HOUR_MS - (Date.now()-startedAtMs);      if (remain <= 0) { load(); return; }      const mm=String(Math.floor(remain/60000)).padStart(2,"0");      const ss=String(Math.floor((remain%60000)/1000)).padStart(2,"0");      const el=qs("#timerDisplay"); if (el) el.textContent = mm+":"+ss;    }    tick();    countdownTimer = setInterval(tick, 1000);    qs("#pf").addEventListener("submit", async (e)=>{      e.preventDefault();      const files=[...qs("#file").files].slice(0,3);      if(!files.length){toast("Choose at least one screenshot");return;}      const btn=qs("#btn"); btn.disabled=true; btn.textContent="Uploading…";      try{        const fd=new FormData();        files.forEach(f=>fd.append("proof", f));        await api("/tasks/"+id+"/proof",{method:"POST",form:fd});        if (countdownTimer) { clearInterval(countdownTimer); countdownTimer=null; }        toast("Proof submitted! Awaiting review.");        setTimeout(()=>{location.hash="#/proofs"; router();},800);      }catch(err){ toast(err.message); btn.disabled=false; btn.textContent="📤 Upload Proof"; }    });  }  function load(){    api("/tasks/"+id).then(view).catch(err=>{ if(countdownTimer){clearInterval(countdownTimer);countdownTimer=null;} mount(header({title:"Task",emoji:"📋",back:"#/tasks"})+errorBox(err.message)); });  }  load();}
function pageCreateTask(){  if(!requireAuth()) return;  loading();  api("/public/settings").then(settings=>{    const isAdminUser = isCurrentUserAdmin();    if (!isAdminUser && settings && settings.taskCreationApprovalRequired) {      mount(header({title:"Create User Task",emoji:"➕",back:"#/dashboard"})+        `<div class="card center" style="padding:30px 20px">          <div style="font-size:40px;margin-bottom:10px">📞</div>          <p>${settings.taskCreationApprovalMessage||"Please contact customer service to get approval before creating a task."}</p>          <a href="${settings.supportUrl||EARNPKR_CONFIG.SUPPORT_URL}" target="_blank" class="pill btn-primary" style="margin-top:16px;width:auto">📞 Contact Support</a>        </div>`);      return;    }    api("/dashboard").then(view).catch(err=>mount(header({title:"Create Task",emoji:"➕",back:"#/dashboard"})+errorBox(err.message)));  }).catch(err=>mount(header({title:"Create Task",emoji:"➕",back:"#/dashboard"})+errorBox(err.message)));  function view(d){    const depositBalance = (d&&d.profile&&d.profile.deposit_balance)||0;    const availBalance = (d&&d.profile&&d.profile.available_balance)||0;    mount(header({title:"Create User Task",emoji:"➕",subtitle:"Post a job for others to complete",back:"#/dashboard"})+    `<div class="card">      <div class="soft center" style="padding:12px;margin-bottom:14px"><span class="muted">Spendable Balance (Deposit + Earnings)</span><div class="bignum" style="font-size:20px">${rs(depositBalance+availBalance)}</div></div>      <form id="f">        <label class="label">Task Name</label><input class="field" id="title" required placeholder="e.g. Join Channel" style="margin-bottom:12px">        <label class="label">Task Description</label><textarea class="field" id="desc" rows="3" style="margin-bottom:12px"></textarea>        <label class="label">Task Link</label><input class="field" id="link" placeholder="https://example.com" style="margin-bottom:12px">        <label class="label">Tot function pageInvite(){  if(!requireAuth()) return;  function dstat(l,v){return `<div class="soft center" style="margin:0"><div class="muted">${l}</div><div class="bignum" style="font-size:20px">${v}</div></div>`}  function view(d){    const code=(d&&d.referral_code)||"—";    const count=(d&&d.referrals_count)||0;    const earnings=(d&&d.referral_earnings)||0;    const pending=(d&&d.pending_referral_bonus)||0;    const referred=(d&&d.referred_users)||[];    const link=location.href.split('#')[0]+"#/register?ref="+code;    mount(header({title:"Referral Center",emoji:"🎁",subtitle:"Invite friends and earn referral bonuses",back:"#/dashboard"})+    `<div class="card"><h3 style="margin-bottom:10px">Your Referral Link</h3>      <div style="background:var(--bg);border-radius:12px;padding:10px;margin-bottom:12px;font-size:12px;word-break:break-all">${link}</div>      <button class="btn btn-primary" id="copy">📋 Copy Referral Link</button></div>    <h3 style="margin:18px 16px 10px">Your Referral Statistics</h3>    <div class="grid2" style="margin:0 16px 16px">      ${dstat("Total Invites",count)}${dstat("Referral Earnings",rs(earnings))}</div>    <div class="card" style="border:2px solid var(--primary)">      <h3 style="margin-bottom:10px">🎯 Pending Bonus</h3>      <div class="soft center" style="padding:14px;margin-bottom:12px"><div class="muted">Ready to claim</div><div class="bignum" style="font-size:26px">${rs(pending)}</div></div>      <button class="btn ${pending>0?'btn-primary':''}" id="claim" ${pending>0?'':'disabled'} style="${pending>0?'':'background:#ddd;color:#888'}">${pending>0?'✅ Claim Now':'Nothing to claim yet'}</button>      <p class="muted" style="margin-top:10px;font-size:12px">Bonus keeps building up automatically — nothing is added to your withdrawable balance until you tap Claim.</p>    </div>    <div class="card"><h3 style="margin-bottom:10px">🎁 Referral Bonus Rules</h3>      <div style="background:var(--bg);border-radius:12px;padding:14px;font-size:14px;line-height:1.7">        ✅ Invite your friends using your referral link.<br>        ✅ For every <b>6 approved tasks</b> a referred user completes, Rs 20 is added to your Pending Bonus above.<br>        👆 You must manually tap <b>Claim Now</b> to receive it — until then it just keeps stacking up.<br>        💰 Once claimed, the money is yours: withdraw it or use it to create tasks.      </div></div>    <div class="card" style="border:1px solid #f87171;background:#fef2f2">      <p style="color:#b91c1c;font-size:13px;margin:0">⚠️ Fake or duplicate accounts will be detected — accounts found doing this will be blocked.</p>    </div>    <div class="card"><h3 style="margin-bottom:10px">👥 Referred Users</h3>      ${referred.length ? referred.map(r=>`<div class="row" style="padding:8px 0;border-bottom:1px solid var(--border)">        <span>${r.name}</span><span class="muted" style="font-size:12px">${r.completed_tasks} tasks done</span></div>`).join("")      : `<div class="center muted" style="padding:20px 0">📭 No referred users yet.<br>Share your referral link and start earning!</div>`}    </div>`);    qs("#copy").onclick=()=>{ navigator.clipboard?.writeText(link); toast("Referral link copied!"); };    const claimBtn=qs("#claim");    if (claimBtn && pending>0) claimBtn.onclick=async ()=>{      claimBtn.disabled=true; claimBtn.textContent="Claiming…";      try{ const r=await api("/invite/claim",{method:"POST"}); toast("🎉 Rs "+rs(r.amount)+" claimed!"); view(await api("/invite")); }      catch(err){ toast(err.message); claimBtn.disabled=false; claimBtn.textContent="✅ Claim Now"; }    };  }  api("/invite").then(view).catch(err=>mount(header({title:"Invite",emoji:"👥",back:"#/dashboard"})+errorBox(err.message)));}
function pageProfile(){  if(!requireAuth()) return;  function view(d, settings){    const p=(d&&d.profile)||{};    const METHODS = (settings&&settings.withdrawalMethods)||["JazzCash","Easypaisa","Bank Transfer"];    let method=p.payment_method||"";    mount(header({title:"My Profile",emoji:"👤",subtitle:"Manage your personal information",back:"#/dashboard"})+    `<div class="card"><h3 style="margin-bottom:12px">Personal Information</h3>      <form id="f">        <label class="label">Full Name</label>        <input class="field" id="name" value="${p.name||""}" required style="margin-bottom:12px">        <label class="label">Email Address</label>        <input class="field" id="email" value="${p.email||""}" disabled style="margin-bottom:12px;background:var(--bg)">        <label class="label">Phone Number</label>        <input class="field" id="phone" value="${p.phone||""}" placeholder="03XXXXXXXXX" style="margin-bottom:12px">        <label class="label">Username</label>        <input class="field" id="username" value="${p.username||""}" style="margin-bottom:12px">        <label class="label">Referral Code</label>        <input class="field" id="refcode" value="${p.referral_code||""}" disabled style="margin-bottom:16px;background:var(--bg)">        <button class="btn btn-primary" id="btn">💾 Save Changes</button>      </form></div>    <div class="card"><h3 style="margin-bottom:6px">🏦 Bind Payment Account</h3>      <p class="muted" style="margin-bottom:12px">Bind your account once so withdrawals are verified & processed faster.</p>      <form id="pf">        <label class="label">Method</label><div class="grid3" id="methods" style="margin-bottom:12px">          ${METHODS.map(m=>`<button type="button" class="method-btn ${m===method?'sel':''}" data-m="${m}">${m}</button>`).join("")}</div>        <label class="label">Account Number</label>        <input class="field" id="pnum" value="${p.payment_account_number||""}" placeholder="03XXXXXXXXX" style="margin-bottom:12px">        <label class="label">Account Title</label>        <input class="field" id="ptitle" value="${p.payment_account_title||""}" placeholder="Full name on the account" style="margin-bottom:16px">        <button class="btn" style="background:#16a34a;color:#fff" id="pbtn">🏦 Save Payment Account</button>      </form></div>`);    qs("#f").addEventListener("submit", async (e)=>{      e.preventDefault();      const btn=qs("#btn"); btn.disabled=true; btn.textContent="Saving…";      try{        await api("/profile",{method:"POST",body:{ name:qs("#name").value, phone:qs("#phone").value, username:qs("#username").value }});        toast("Profile updated ✓");      }catch(err){ toast(err.message); }      btn.disabled=false; btn.textContent="💾 Save Changes";    });    qsa("#methods .method-btn").forEach(b=>b.onclick=()=>{qsa("#methods .method-btn").forEach(x=>x.classList.remove("sel"));b.classList.add("sel");method=b.dataset.m;});    qs("#pf").addEventListener("submit", async (e)=>{      e.preventDefault();      if(!method){toast("Choose a payment method");return;}      const btn=qs("#pbtn"); btn.disabled=true; btn.textContent="Saving…";      try{        await api("/profile",{method:"POST",body:{ payment_method:method, payment_account_number:qs("#pnum").value, payment_account_title:qs("#ptitle").value }});        toast("Payment account saved ✓");      }catch(err){ toast(err.message); }      btn.disabled=false; btn.textContent="🏦 Save Payment Account";    });  }  Promise.all([api("/dashboard"), api("/public/settings")]).then(([d,s])=>view(d,s))    .catch(err=>mount(header({title:"My Profile",emoji:"👤",back:"#/dashboard"})+errorBox(err.message)));}
function pageNotifications(){  if(!requireAuth()) return;  function view(d){    const list=(d&&d.notifications)||[];    mount(header({title:"Notifications",emoji:"🔔",subtitle:"Updates on your tasks & payments",back:"#/dashboard"})+    `<div style="padding:0 16px">${list.length?list.map(n=>`      <div class="soft" style="margin:0 0 10px;padding:14px;${n.seen?'':'border-left:4px solid var(--primary)'}">        <div>${n.text}</div><div class="muted" style="font-size:11px;margin-top:4px">${fmtDate(n.created_at)}</div>      </div>`).join(""):errorBox("No notifications yet.")}</div>`);    api("/notifications/seen",{method:"POST"}).catch(()=>{});  }  api("/notifications").then(view).catch(err=>mount(header({title:"Notifications",emoji:"🔔",back:"#/dashboard"})+errorBox(err.message)));}

const ROUTES = {
  "/": pageDashboard, "/dashboard": pageDashboard, "/tasks": pageTasks, "/task": pageTask,
  "/create-task": pageCreateTask, "/proofs": pageProofs, "/manage": pageManage, "/deposit": pageDeposit,
  "/withdraw": pageWithdraw, "/vip": pageVip, "/spin": pageSpin, "/streak": pageStreak,
  "/coupon": pageCoupon, "/invite": pageInvite, "/profile": pageProfile, "/notifications": pageNotifications,
};
async function router(){
  const { route } = hashParts();
  window.scrollTo(0,0);
  if (!(await checkMaintenanceOk(false))) return;
  (ROUTES[route] || pageDashboard)();
}
window.addEventListener("hashchange", router);
(async function(){ await initAuth(); router(); })();

</script>
